<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Table | Tangerine Restrobar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100..900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    :root {
      --color-booking-bg: #0a0a0a;
      --color-input-bg: #f5e6d3;
      --color-input-text: #2d1b0d;
    }

    body {
      background-color: var(--color-booking-bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .booking-wrapper {
      max-width: 800px;
      width: 100%;
      position: relative;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
    }

    .booking-header {
      margin-bottom: 2.5rem;
    }

    .booking-title {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--color-input-bg);
      letter-spacing: -1px;
      line-height: 0.9;
    }

    .booking-subtitle {
      font-size: 1rem;
      opacity: 0.8;
      font-weight: 300;
    }

    .booking-form {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      text-align: left;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
    }

    .form-group input,
    .form-group select {
      background-color: var(--color-input-bg);
      border: none;
      padding: 0.8rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--color-input-text);
      width: 100%;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(45, 27, 13, 0.4);
    }

    .submit-btn-wrapper {
      grid-column: span 3;
      margin-top: 1.5rem;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: #fff;
      color: var(--color-booking-bg);
    }

    @media (max-width: 900px) {
      .booking-title {
        font-size: 5rem;
      }

      .booking-form {
        grid-template-columns: 1fr 1fr;
      }

      .submit-btn-wrapper {
        grid-column: span 2;
      }
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
        padding-top: 2rem;
      }

      .close-btn {
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
      }

      .booking-title {
        font-size: 4rem;
        margin-top: 5rem;
      }

      .booking-form {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .submit-btn-wrapper {
        grid-column: span 1;
      }

      .booking-wrapper {
        padding-top: 0;
      }
    }
  </style>
</head>

<body>
  <div class="booking-wrapper">
    <a href="index.html" class="close-btn">✕</a>

    <div class="booking-header">
      <h1 class="booking-title">BOOK YOUR TABLE</h1>
      <p class="booking-subtitle">Fill out the form below, and we'll have your table waiting!</p>
    </div>

    <form class="booking-form" action="#" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Arjun Bharath" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="arjun@gmail.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>
      </div>

      <div class="form-group">
        <label for="time">Time</label>
        <select id="time" name="time" required>
          <option value="" disabled selected>Select...</option>
          <option value="18:00">6:00 PM</option>
          <option value="19:00">7:00 PM</option>
          <option value="20:00">8:00 PM</option>
          <option value="21:00">9:00 PM</option>
          <option value="22:00">10:00 PM</option>
        </select>
      </div>

      <div class="form-group">
        <label for="people">People</label>
        <select id="people" name="people" required>
          <option value="" disabled selected>Select...</option>
          <option value="1">1 Person</option>
          <option value="2">2 People</option>
          <option value="3">3 People</option>
          <option value="4">4 People</option>
          <option value="5">5+ People</option>
        </select>
      </div>

      <div class="submit-btn-wrapper">
        <button type="submit" class="submit-btn">SUBMIT</button>
      </div>
    </form>
  </div>
</body>

</html>
