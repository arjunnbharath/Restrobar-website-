<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Zayro</title>
  <meta name="description" content="Get in touch with Zayro. Reach us via Instagram, WhatsApp, or send us a message directly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100..900&family=Inter:wght@300;400;500;600&family=Sacramento&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
  <style>
    :root {
      --color-contact-bg: #0a0a0a;
      --color-input-bg: #f5e6d3;
      --color-input-text: #2d1b0d;
      --color-accent: #ff6b00;
    }

    body {
      background-color: var(--color-contact-bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .contact-wrapper {
      max-width: 1000px;
      width: 100%;
      position: relative;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-btn {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: #fff;
    }

    /* Header */
    .contact-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .contact-title {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-input-bg);
      letter-spacing: -1px;
      line-height: 0.9;
      margin-bottom: 0.5rem;
    }

    .contact-subtitle {
      font-size: 1rem;
      opacity: 0.7;
      font-weight: 300;
    }

    /* Main Layout */
    .contact-body {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
      align-items: start;
    }

    /* Left: Social & Info */
    .contact-left {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .social-card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      transition: all 0.35s ease;
      cursor: pointer;
    }

    .social-card:hover {
      border-color: var(--color-accent);
      background: rgba(255, 107, 0, 0.06);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 107, 0, 0.1);
    }

    .social-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.5rem;
    }

    .social-icon.instagram {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .social-icon.whatsapp {
      background: #25D366;
    }

    .social-details h3 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.2rem;
    }

    .social-details p {
      font-size: 0.85rem;
      opacity: 0.6;
      font-weight: 300;
    }

    .social-arrow {
      margin-left: auto;
      font-size: 1.2rem;
      opacity: 0.4;
      transition: all 0.3s ease;
    }

    .social-card:hover .social-arrow {
      opacity: 1;
      transform: translateX(4px);
      color: var(--color-accent);
    }

    /* Info Block */
    .info-block {
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
    }

    .info-block h3 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color-accent);
      margin-bottom: 1rem;
    }

    .info-block p {
      font-size: 0.9rem;
      line-height: 1.7;
      opacity: 0.7;
      font-weight: 300;
    }

    .info-block p + p {
      margin-top: 0.3rem;
    }

    /* Right: Form */
    .contact-right h2 {
      font-family: 'Big Shoulders Display', sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
      color: var(--color-input-bg);
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea {
      background-color: var(--color-input-bg);
      border: none;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--color-input-text);
      width: 100%;
      outline: none;
      transition: box-shadow 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      box-shadow: 0 0 0 2px var(--color-accent);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(45, 27, 13, 0.4);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
    }

    .submit-btn:hover {
      background: #fff;
      color: var(--color-contact-bg);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .contact-body {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .contact-title {
        font-size: 4rem;
      }

      .contact-header {
        margin-bottom: 2.5rem;
      }

      .close-btn {
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
      }

      .contact-wrapper {
        padding-top: 0;
      }

      .contact-title {
        margin-top: 5rem;
      }
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: 2rem;
      }

      .contact-title {
        font-size: 3.2rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="contact-wrapper">
    <a href="index.html" class="close-btn">✕</a>

    <div class="contact-header">
      <h1 class="contact-title">CONTACT US</h1>
      <p class="contact-subtitle">We'd love to hear from you. Reach out anytime!</p>
    </div>

    <div class="contact-body">
      <!-- Left: Social Links & Info -->
      <div class="contact-left">
        <a href="https://instagram.com/" target="_blank" class="social-card" id="instagram-link">
          <div class="social-icon instagram">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">

            </svg>
          </div>
          <div class="social-details">
            <h3>Instagram</h3>
            <p>@zayro.restaurant</p>
          </div>
          <span class="social-arrow">→</span>
        </a>

        <a href="https://wa.me/1234567890" target="_blank" class="social-card" id="whatsapp-link">

            </svg>
          </div>
          <div class="social-details">
            <h3>WhatsApp</h3>
            <p>Chat with us directly</p>
          </div>
          <span class="social-arrow">→</span>
        </a>

        <div class="info-block">
          <h3>Visit Us</h3>
          <p>123 Culinary Avenue, Flavor Town, FT 45678</p>
          <p>Mon - Thu: 11am - 10pm</p>
          <p>Fri - Sun: 11am - 12am</p>
        </div>
      </div>

      <!-- Right: Contact Form -->
      <div class="contact-right">
        <h2>Send Us a Message</h2>
        <form class="contact-form" action="#" method="POST" id="contact-form">
          <div class="form-row">
            <div class="form-group">
              <label for="contact-name">Name</label>
              <input type="text" id="contact-name" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
              <label for="contact-email">Email</label>
              <input type="email" id="contact-email" name="email" placeholder="you@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="contact-subject">Subject</label>
            <input type="text" id="contact-subject" name="subject" placeholder="What's this about?">
          </div>

          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" placeholder="Tell us what's on your mind..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">SEND MESSAGE</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
